<div class="auth-page">
  <div class="auth-card">
    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to your DriveEase account</p>

    @if (error()) {
      <div class="alert-error" role="alert">{{ error() }}</div>
    }

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <div class="field">
        <label for="email">Email address</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          autocomplete="email"
          [attr.aria-invalid]="form.controls.email.invalid && form.controls.email.touched"
          aria-describedby="email-error"
        />
        @if (form.controls.email.invalid && form.controls.email.touched) {
          <span id="email-error" class="field-error" role="alert">Enter a valid email</span>
        }
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          autocomplete="current-password"
          [attr.aria-invalid]="form.controls.password.invalid && form.controls.password.touched"
          aria-describedby="password-error"
        />
        @if (form.controls.password.invalid && form.controls.password.touched) {
          <span id="password-error" class="field-error" role="alert">Password is required</span>
        }
      </div>

      <button type="submit" class="btn-primary" [disabled]="loading()">
        {{ loading() ? 'Signing in…' : 'Sign in' }}
      </button>
    </form>

    <p class="auth-footer">No account? <a routerLink="/register">Register here</a></p>
  </div>
</div>
